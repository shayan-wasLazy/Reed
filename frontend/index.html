<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reed</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- WORKSPACE -->
    <aside class="workspace">

        <h1>Workspace</h1>

        <div id="workspace-tree"></div>

    </aside>

    <!-- EDITOR -->
    <main class="editor">

        <div class="editor-content">

            <h2>Welcome to Reed</h2>

            <p>
                Select a file from the workspace.
            </p>

        </div>

    </main>

    <!-- CHAT -->
    <div class="chat-wrapper">

        <button
            class="toggle-btn"
            id="toggleChat">
            <
        </button>

        <aside
            class="chat-panel"
            id="chatPanel">

            <div class="chat-history">

            </div>

            <div class="chat-input">

                <input
                    type="text"
                    placeholder="Chat with AI..."
                >

                <button class="send-btn">
                    ↑
                </button>

            </div>

        </aside>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
